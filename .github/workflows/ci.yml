name: 🚀 ISRO Dashboard — CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────────────────
  # JOB 1: Lint & Test (runs on every push + PR)
  # ─────────────────────────────────────────────────
  test:
    name: ✅ Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install Dependencies
        run: pip install -r requirements.txt

      - name: 🔍 Check Import Structure
        run: python -c "from backend import create_app; app = create_app(); print('✅ App factory works')"

      - name: 🌐 Check Routes
        run: |
          python -c "
          from backend import create_app
          app = create_app()
          client = app.test_client()

          # Test all key routes
          routes = ['/', '/map', '/favourites', '/api/stats', '/api/spacecrafts',
                    '/api/launchers', '/api/customer_satellites', '/api/centres',
                    '/api/analytics', '/api/countries', '/auth/me']

          for route in routes:
              r = client.get(route)
              assert r.status_code in [200, 302], f'FAIL: {route} returned {r.status_code}'
              print(f'✅ {route} → {r.status_code}')
          print('All routes passed!')
          "

      - name: 🔒 Test Auth Flow
        run: |
          python -c "
          import json
          from backend import create_app
          app = create_app()
          client = app.test_client()

          # Register
          r = client.post('/auth/register', json={'username':'testuser','email':'test@test.com','password':'test123'})
          assert r.status_code == 201, f'Register failed: {r.status_code}'
          print('✅ Register works')

          # Login
          r = client.post('/auth/login', json={'identifier':'testuser','password':'test123'})
          assert r.status_code == 200, f'Login failed: {r.status_code}'
          print('✅ Login works')

          # Bad login
          r = client.post('/auth/login', json={'identifier':'testuser','password':'wrong'})
          assert r.status_code == 401
          print('✅ Bad login correctly rejected')

          print('All auth tests passed!')
          "

  # ─────────────────────────────────────────────────
  # JOB 2: Build Docker Image (main branch only)
  # ─────────────────────────────────────────────────
  build:
    name: 🐳 Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐳 Build Docker image
        run: docker build -t isro-dashboard:latest .

      - name: 🏃 Test container starts
        run: |
          docker run -d --name isro-test -p 5000:5000 isro-dashboard:latest
          sleep 4
          curl -f http://localhost:5000/ && echo "✅ Container responding"
          docker stop isro-test

  # ─────────────────────────────────────────────────
  # JOB 3: Notify (main branch only)
  # ─────────────────────────────────────────────────
  notify:
    name: 🎉 Deployment Ready
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    steps:
      - name: ✅ Print summary
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║  🚀 ISRO DASHBOARD — ALL CHECKS PASSED               ║"
          echo "║                                                      ║"
          echo "║  ✅ Python imports & app factory                     ║"
          echo "║  ✅ All API routes (9 endpoints)                     ║"
          echo "║  ✅ Auth flow (register / login / reject)            ║"
          echo "║  ✅ Docker image builds and serves                   ║"
          echo "║                                                      ║"
          echo "║  Ready to deploy to Railway / Render / VPS           ║"
          echo "╚══════════════════════════════════════════════════════╝"
